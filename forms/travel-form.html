<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Form TEST</title>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:8px}
input,select,textarea{width:100%;padding:10px;margin-top:8px;margin-bottom:15px}
button{padding:12px;width:100%;background:#f5b400;border:none;font-weight:bold}
</style>
</head>

<body>

<div class="container">
<h2>Travel Form TEST MODE</h2>

<form id="travelForm">

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="mobile" placeholder="Mobile" required>
<input type="email" name="email" placeholder="Email" required>

<input type="text" name="destination" placeholder="Destination" required>

<textarea name="message" placeholder="Message" required></textarea>

<button type="submit" id="submitBtn">Submit Test</button>

</form>
</div>

<script>
let isSubmitting = false;

document.getElementById("travelForm").addEventListener("submit", function(e){
  e.preventDefault();
  if(isSubmitting) return;

  const form = this;
  const btn = document.getElementById("submitBtn");

  isSubmitting = true;
  btn.disabled = true;
  btn.innerText = "Submitting...";

  const formData = new FormData(form);

  fetch("https://script.google.com/macros/s/AKfycbxmWvcT7JgC9-P4_OK-MmN77GpgWT4wlh-IikkIRYbktZxGJmgvOKfB3M3obyPhEtO85A/exec", {
    method: "POST",
    body: formData
  })
  .then(res => res.text())
  .then(data => {
      alert("SERVER RESPONSE:\n\n" + data);
      btn.disabled = false;
      btn.innerText = "Submit Test";
      isSubmitting = false;
  })
  .catch(error => {
      alert("FETCH FAILED:\n\n" + error);
      btn.disabled = false;
      btn.innerText = "Submit Test";
      isSubmitting = false;
  });
});
</script>

</body>
</html>
