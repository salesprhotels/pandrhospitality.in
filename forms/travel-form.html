<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Enquiry</title>
<style>
body{font-family:Arial;background:#4b3fd6;color:#fff;text-align:center;padding:40px}
.container{background:#fff;color:#333;max-width:600px;margin:auto;padding:30px;border-radius:10px}
input,select,textarea{width:100%;padding:10px;margin:8px 0}
button{padding:12px;width:100%;background:#f5b400;border:none;font-weight:bold}
footer{margin-top:30px;color:#fff}
</style>
</head>
<body>

<div class="container">
<h2>Travel Enquiry Form</h2>

<form id="travelForm">
<input name="name" placeholder="Full Name" required>
<input name="mobile" placeholder="Mobile" required>
<input name="email" placeholder="Email" required>

<select name="travel_type" required>
<option value="">Select Travel Type</option>
<option>Domestic Tour</option>
<option>Pilgrimage Tour</option>
<option>Hotel Booking</option>
</select>

<input name="destination" placeholder="Destination" required>
<input type="date" name="journey_date" required>
<input type="date" name="return_date" required>
<input type="number" name="adults" value="1" required>
<input type="number" name="children" value="0">
<input name="budget" placeholder="Budget" required>
<textarea name="message" placeholder="Message" required></textarea>

<button type="submit">Submit</button>
</form>
</div>

<footer>
© 2026 Yes We Care Travels<br>
Operated & Managed by PMS Hospitality Management Services
</footer>

<script>
document.getElementById("travelForm").addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(this);

  fetch("PASTE_YOUR_EXEC_URL_HERE", {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    if(data.status === "success"){
      alert("Form submitted successfully!");
      this.reset();
    } else {
      alert("Error: " + JSON.stringify(data));
    }
  })
  .catch(err => {
    alert("Connection Error: " + err);
  });

});
</script>

</body>
</html>
