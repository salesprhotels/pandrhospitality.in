<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Enquiry Form | Yes We Care Travels</title>

<meta name="description" content="Submit your travel enquiry for cab services, pilgrimage tours, holiday packages and hotel booking across India.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://pandrhospitality.in/forms/travel-form.html">

<!-- Google Ads -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-836426031"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'AW-836426031');
</script>

<!-- reCAPTCHA v3 -->
<script src="https://www.google.com/recaptcha/api.js?render=6LfZ5HUsAAAAAEJ7DJKe4QTqAomuEUJzs4fc53lU"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial;background:#f4f6fb;color:#333}
.container{max-width:600px;margin:40px auto;background:#fff;padding:25px;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.08)}
h1{text-align:center;color:#4b3fd6;margin-bottom:20px}
label{font-weight:600;display:block;margin-top:14px}
input,select,textarea{width:100%;padding:10px;margin-top:6px;border:1px solid #ccc;border-radius:5px}
textarea{min-height:90px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;margin-top:20px;padding:12px;background:#f5b400;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer}
button:disabled{opacity:0.6;cursor:not-allowed}
footer{text-align:center;font-size:13px;color:#777;margin:20px 0}
@media(max-width:600px){.row{grid-template-columns:1fr}}
</style>
</head>

<body>

<div class="container">
<h1>Travel Enquiry Form</h1>

<form id="travelForm">

<label>Full Name *</label>
<input type="text" name="name" required>

<label>Mobile Number *</label>
<input type="tel" name="mobile" pattern="[0-9]{10}" required>

<label>Email *</label>
<input type="email" name="email" required>

<label>Travel Type *</label>
<select name="travel_type" required>
<option value="">Select Travel Type</option>
<option>Domestic Tour</option>
<option>Pilgrimage Tour</option>
<option>Hotel Booking</option>
<option>Taxi / Transport</option>
<option>Group / Corporate Travel</option>
<option>Air Tickets</option>
<option>Bus Tickets</option>
</select>

<label>Destination *</label>
<input type="text" name="destination" required>

<div class="row">
<div>
<label>From Date *</label>
<input type="date" id="fromDate" name="journey_date" required>
</div>
<div>
<label>To Date *</label>
<input type="date" id="toDate" name="return_date" required>
</div>
</div>

<div class="row">
<div>
<label>Adults *</label>
<input type="number" min="1" value="1" name="adults" required>
</div>
<div>
<label>Children</label>
<input type="number" min="0" value="0" name="children">
</div>
</div>

<label>Budget Range *</label>
<select name="budget" required>
<option value="">Select Budget</option>
<option>Below ₹20,000</option>
<option>₹20,000 – ₹50,000</option>
<option>₹50,000 – ₹1,00,000</option>
<option>Above ₹1,00,000</option>
</select>

<label>Message *</label>
<textarea name="message" required></textarea>

<button type="submit" id="submitBtn">Submit Travel Enquiry</button>

</form>
</div>

<footer>
© 2026 Yes We Care Travels
</footer>

<script>
const form = document.getElementById("travelForm");
const btn = document.getElementById("submitBtn");
const fromDate = document.getElementById("fromDate");
const toDate = document.getElementById("toDate");

fromDate.addEventListener("change", function(){
  if(this.value){
    let nextDay = new Date(this.value);
    nextDay.setDate(nextDay.getDate()+1);
    let formatted = nextDay.toISOString().split('T')[0];
    toDate.value = formatted;
    toDate.min = formatted;
  }
});

form.addEventListener("submit", function(e){
  e.preventDefault();

  btn.disabled = true;
  btn.innerText = "Submitting...";

  grecaptcha.ready(function(){
    grecaptcha.execute('6LfZ5HUsAAAAAEJ7DJKe4QTqAomuEUJzs4fc53lU', {action:'submit'})
    .then(function(token){

      const formData = new FormData(form);
      formData.append("recaptchaToken", token);

      fetch("https://script.google.com/macros/s/AKfycbxmWvcT7JgC9-P4_OK-MmN77GpgWT4wlh-IikkIRYbktZxGJmgvOKfB3M3obyPhEtO85A/exec", {
        method: "POST",
        body: formData
      })
      .then(res => res.json())
      .then(data => {

        if(data.status === "success"){
          window.location.href = "../thank-you-travel.html";
        }
        else if(data.status === "duplicate"){
          alert("You already submitted recently. Please wait 2 minutes.");
        }
        else if(data.status === "spam"){
          alert("Spam detected. Please try again.");
        }
        else{
          alert("Error:\n" + JSON.stringify(data));
        }

        btn.disabled = false;
        btn.innerText = "Submit Travel Enquiry";

      })
      .catch(err => {
        alert("Connection error:\n" + err);
        btn.disabled = false;
        btn.innerText = "Submit Travel Enquiry";
      });

    });
  });

});
</script>

</body>
</html>
