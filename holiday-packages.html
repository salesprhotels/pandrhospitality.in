<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Holiday Packages Across India | Yes We Care Travels</title>

<meta name="description" content="Customised holiday packages across India including Himachal, Goa, Kerala and North East tours.">
<meta name="keywords" content="holiday packages India, Himachal tour package, Goa tour package, Kerala holiday">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://pandrhospitality.in/holiday-packages.html">
<meta name="author" content="Yes We Care Travels">

<script async src="https://www.googletagmanager.com/gtag/js?id=AW-836426031"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'AW-836426031');
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#f4f6fb;
color:#222
}

header{
background:#fff;
border-bottom:1px solid #ddd
}

.header-wrap{
max-width:1200px;
margin:auto;
padding:12px;
display:flex;
justify-content:center;
}

.logos img{height:40px}

.hero{
background:linear-gradient(135deg,#0b5ed7,#ff8c00);
color:#fff;
text-align:center;
padding:60px
}

.section{
max-width:1200px;
margin:auto;
padding:40px 20px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
cursor:pointer;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card div{padding:15px}

.result-box{
background:#fff;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,.08)
}

.tour-card{
border-bottom:1px solid #eee;
padding:15px;
}

.tour-card h3{
color:#0b5ed7;
margin-bottom:5px;
}

.btn{
display:inline-block;
padding:8px 14px;
border-radius:6px;
text-decoration:none;
margin-top:8px;
}

.btn-view{background:#ff8c00;color:#fff}
.btn-quote{background:#0b5ed7;color:#fff}

.itinerary img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.day{
margin-bottom:15px;
padding-bottom:10px;
border-bottom:1px dashed #ddd;
}

footer{
text-align:center;
padding:20px;
background:#fff;
margin-top:20px;
}

@media print{
header,.grid,footer{display:none}
}
</style>
</head>

<body>

<header>
<div class="header-wrap">
<div class="logos">
<img src="images/logo-pr-hospitality.png">
<img src="images/logo-yes-we-care-travels-1.png">
</div>
</div>
</header>

<section class="hero">
<h1>Holiday Packages Across India</h1>
<p>Explore curated travel experiences</p>
</section>

<section class="section">
<div class="grid">

<div class="card" onclick="openSearch('Himachal')">
<img src="images/holiday-himachal.png">
<div><h3>Himachal</h3></div>
</div>

<div class="card" onclick="openSearch('Kashmir')">
<img src="images/holiday-kashmir.png">
<div><h3>Kashmir</h3></div>
</div>

<div class="card" onclick="openSearch('Goa')">
<img src="images/holiday-goa.png">
<div><h3>Goa</h3></div>
</div>

<div class="card" onclick="openSearch('Kerala')">
<img src="images/holiday-kerala.png">
<div><h3>Kerala</h3></div>
</div>

<div class="card" onclick="openSearch('NorthEast')">
<img src="images/holiday-northeast.jpg">
<div><h3>North East</h3></div>
</div>

</div>
</section>

<section class="section">
<div id="results"></div>
</section>

<footer>
© 2026 Yes We Care Travels
</footer>

<script>

const API="https://script.google.com/macros/s/AKfycbw1x94TiqnbDf2BQvd-3ef5s_0drtDjVl1kVyZGkIqAil9FLBuqyC4Zq3qOj5UBGy2C/exec";

let ALL_TOURS=[];

const DEST_IMAGES={
himachal:"images/holiday-himachal.png",
kashmir:"images/holiday-kashmir.png",
goa:"images/holiday-goa.png",
kerala:"images/holiday-kerala.png",
northeast:"images/holiday-northeast.jpg"
};

fetch(API)
.then(res=>res.json())
.then(data=>{
ALL_TOURS=data;
});

function openSearch(destination){

let tours={};

ALL_TOURS.forEach(row=>{

let dest=row.destination.toLowerCase();
let tour=row.tour_name;

if(dest.includes(destination.toLowerCase())){

if(!tours[tour]) tours[tour]=[];
tours[tour].push(row);

}

});

let html="<div class='result-box'>";
html+="<h2>"+destination+" Tour Packages</h2>";

for(let t in tours){

html+=`
<div class="tour-card">
<h3>${t}</h3>
<p>${tours[t][0].days} Days</p>

<button class="btn btn-view" onclick="viewItinerary('${t}')">View Itinerary</button>

<a class="btn btn-quote" href="/forms/travel-form.html?tour=${encodeURIComponent(t)}">
Get Quote
</a>
</div>
`;

}

html+="</div>";

document.getElementById("results").innerHTML=html;
}

function viewItinerary(tour){

let tourData=ALL_TOURS.filter(d=>d.tour_name==tour);

let dest=tourData[0].destination.toLowerCase();
let img=DEST_IMAGES[dest] || "";

let html="<div class='result-box itinerary'>";

html+=`<img src="${img}">`;
html+=`<h2>${tour}</h2>`;

tourData.forEach(d=>{
html+=`
<div class="day">
<b>${d.day_number}</b>
<p>${d.title}</p>
<p>${d.description}</p>
</div>
`;
});

html+=`
<button class="btn btn-view" onclick="window.print()">Download PDF</button>

<a class="btn btn-quote" href="/forms/travel-form.html?tour=${encodeURIComponent(tour)}">
Get Quote
</a>
`;

html+="</div>";

document.getElementById("results").innerHTML=html;
}

</script>

</body>
</html>
