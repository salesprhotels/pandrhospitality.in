<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Holiday Packages Across India | Yes We Care Travels</title><meta name="description" content="Explore curated holiday packages across India including Himachal, Goa, Kerala and North East tours. Custom itineraries with hotels, cabs and guided tours."><meta name="keywords" content="India holiday packages, Himachal tour package, Goa holiday package, Kerala tour itinerary, North East tour packages"><meta name="robots" content="index, follow"><meta name="author" content="Yes We Care Travels"><link rel="canonical" href="https://pandrhospitality.in/holiday-packages.html"><!-- Open Graph --><meta property="og:title" content="Holiday Packages Across India">
<meta property="og:description" content="Discover curated travel experiences across India.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pandrhospitality.in/holiday-packages.html">
<meta property="og:image" content="https://pandrhospitality.in/images/holiday-himachal.png"><!-- Twitter --><meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Holiday Packages Across India">
<meta name="twitter:description" content="Custom holiday packages across India">
<meta name="twitter:image" content="https://pandrhospitality.in/images/holiday-himachal.png"><style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
margin:0;
}

.section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,.1);
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card div{
padding:18px;
text-align:center;
}

.search-panel{
background:#fff;
padding:25px;
border-radius:10px;
margin-top:30px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.result-box{
background:#fff;
padding:25px;
border-radius:10px;
margin-top:20px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

button{
padding:10px 20px;
background:#0b5ed7;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

</style></head><body><section class="section"><h1>Popular Holiday Destinations</h1><div class="grid"><div class="card" onclick="openSearch('Himachal')">
<img src="images/holiday-himachal.png">
<div>
<h3>Himachal Tours</h3>
<p>Shimla & Manali escapes</p>
</div>
</div><div class="card" onclick="openSearch('Goa')">
<img src="images/holiday-goa.png">
<div>
<h3>Goa Holidays</h3>
<p>Beach resorts & nightlife</p>
</div>
</div><div class="card" onclick="openSearch('NorthEast')">
<img src="images/holiday-northeast.jpg">
<div>
<h3>North East</h3>
<p>Sikkim & Meghalaya</p>
</div>
</div><div class="card" onclick="openSearch('Kerala')">
<img src="images/holiday-kerala.png">
<div>
<h3>Kerala Tours</h3>
<p>Backwaters & hill stations</p>
</div>
</div></div><div id="searchArea"></div><div id="results"></div></section><script>

const API="https://script.google.com/macros/s/AKfycbw1x94TiqnbDf2BQvd-3ef5s_0drtDjVl1kVyZGkIqAil9FLBuqyC4Zq3qOj5UBGy2C/exec";

function openSearch(destination){

let html=`

<div class="search-panel">

<h3>Packages - ${destination}</h3>

<select id="category">

<option value="">All Categories</option>
<option value="Holiday">Holiday</option>
<option value="Honeymoon">Honeymoon</option>
<option value="Family">Family</option>
<option value="Adventure">Adventure</option>

</select>

<br><br>

<button onclick="loadPackages('${destination}')">Show Packages</button>

</div>

`;

document.getElementById("searchArea").innerHTML=html;

document.getElementById("results").innerHTML="";

}

function loadPackages(destination){

let category=document.getElementById("category").value;

let url=API+"?destination="+destination+"&category="+category;

fetch(url)

.then(res=>res.json())

.then(data=>{

if(data.length==0){

document.getElementById("results").innerHTML=
"<div class='result-box'>No packages found.</div>";

return;

}

let tours={};

data.forEach(row=>{

if(!tours[row.tour_name]){

tours[row.tour_name]=row.days;

}

});

let html="";

for(let t in tours){

html+=`

<div class="result-box">

<h3>${t}</h3>

<p>${tours[t]} Days Tour</p>

<button onclick="viewItinerary('${t}')">View Itinerary</button>

</div>

`;

}

document.getElementById("results").innerHTML=html;

});

}

function viewItinerary(tour){

fetch(API+"?tour="+tour)

.then(res=>res.json())

.then(data=>{

let html="<div class='result-box'><h3>"+tour+"</h3>";

data.forEach(d=>{

html+=`

<h4>${d.day_number} - ${d.title}</h4>

<p>${d.description}</p>

<hr>

`;

});

html+="<button onclick='window.print()'>Print</button>";

html+="</div>";

document.getElementById("results").innerHTML=html;

});

}

</script></body></html>
