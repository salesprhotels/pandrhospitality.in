<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial; background:#0f1b2b; color:white; padding:20px;}
    .box { background:white; color:black; padding:20px; margin-bottom:20px; border-radius:10px;}
    input, select { padding:8px; margin:5px;}
    button { padding:10px 15px; background:#1e3a8a; color:white; border:none;}
    .hidden { display:none; }
  </style>
</head>

<body>

<h2>Construction Internal Dashboard</h2>

<div class="box">
<h3>Add Payment</h3>
<input type="date" id="paymentDate">
<input placeholder="Paid By" id="paidBy">
<input placeholder="Vendor Type" id="vendorType">
<input placeholder="Vendor Name" id="vendorName">
<input placeholder="Category" id="category">
<input type="number" placeholder="Amount" id="amount">

<select id="paymentMode" onchange="toggleMode()">
<option value="">Payment Mode</option>
<option value="Cash">Cash</option>
<option value="UPI">UPI</option>
<option value="Bank">Bank Transfer</option>
<option value="Cheque">Cheque</option>
</select>

<div id="transactionDiv" class="hidden">
<input placeholder="Transaction ID" id="transactionId">
</div>

<div id="chequeDiv" class="hidden">
<input placeholder="Cheque No" id="chequeNo">
<input placeholder="Bank Name" id="bankName">
</div>

<input placeholder="Remarks" id="remarks">
<button onclick="submitPayment()">Submit Payment</button>
</div>

<div class="box">
<h3>Add Material</h3>
<input type="date" id="purchaseDate">
<input placeholder="Vendor Name" id="mVendor">
<input placeholder="Material Name" id="materialName">
<input type="number" placeholder="Quantity" id="quantity">
<input placeholder="Unit" id="unit">
<input type="number" placeholder="Rate" id="rate">
<input placeholder="Remarks" id="mRemarks">
<button onclick="submitMaterial()">Submit Material</button>
</div>

<script>
function toggleMode(){
  const mode = paymentMode.value;
  document.getElementById("transactionDiv").classList.add("hidden");
  document.getElementById("chequeDiv").classList.add("hidden");

  if(mode === "UPI" || mode === "Bank"){
    document.getElementById("transactionDiv").classList.remove("hidden");
  }
  if(mode === "Cheque"){
    document.getElementById("chequeDiv").classList.remove("hidden");
  }
}

function clearPaymentForm(){
  paymentDate.value="";
  paidBy.value="";
  vendorType.value="";
  vendorName.value="";
  category.value="";
  amount.value="";
  paymentMode.value="";
  transactionId.value="";
  chequeNo.value="";
  bankName.value="";
  remarks.value="";
  toggleMode();
}

function submitPayment(){

  if(!paymentDate.value || !paidBy.value || !vendorName.value || !amount.value || !paymentMode.value){
    alert("Please fill required fields");
    return;
  }

  const data = {
    paymentDate:paymentDate.value,
    paidBy:paidBy.value,
    vendorType:vendorType.value,
    vendorName:vendorName.value,
    category:category.value,
    amount:amount.value,
    paymentMode:paymentMode.value,
    transactionId:transactionId.value,
    chequeNo:chequeNo.value,
    bankName:bankName.value,
    remarks:remarks.value
  };

  google.script.run.withSuccessHandler(function(res){
    alert(res);
    clearPaymentForm();
  }).addPayment(data);
}

function submitMaterial(){

  if(!purchaseDate.value || !mVendor.value || !materialName.value || !quantity.value || !rate.value){
    alert("Please fill required fields");
    return;
  }

  const data = {
    purchaseDate:purchaseDate.value,
    vendorName:mVendor.value,
    materialName:materialName.value,
    quantity:quantity.value,
    unit:unit.value,
    rate:rate.value,
    remarks:mRemarks.value
  };

  google.script.run.withSuccessHandler(function(res){
    alert(res);
    purchaseDate.value="";
    mVendor.value="";
    materialName.value="";
    quantity.value="";
    unit.value="";
    rate.value="";
    mRemarks.value="";
  }).addMaterial(data);
}
</script>

</body>
</html>
