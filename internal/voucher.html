<!DOCTYPE html>
<html>
<head>

<title>Voucher Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:8px;
max-width:900px;
margin:auto;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:5px;
}

label{
font-weight:bold;
}

button{
background:#4b3df0;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#3727d6;
}

.hotel-box{
border:1px solid #ddd;
padding:15px;
margin-top:10px;
border-radius:6px;
}

.required{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>Yes We Care Travels – Voucher Generator</h2>

<p style="text-align:center">
Operated by P & R Hospitality Management Services
</p>


<h3>Guest Details</h3>

<label>Guest Name <span class="required">*</span></label>
<input type="text" id="guestName" required>

<label>Mobile Number <span class="required">*</span></label>
<input type="text" id="mobile" required>

<label>Email</label>
<input type="email" id="email">

<label>Adults <span class="required">*</span></label>
<input type="number" id="adults" min="1" required>

<label>Children</label>
<input type="number" id="children" min="0">


<h3>Tour Dates</h3>

<label>Tour Start <span class="required">*</span></label>
<input type="date" id="tourStart" required>

<label>Tour End <span class="required">*</span></label>
<input type="date" id="tourEnd" required>

<label>Total Nights</label>
<input type="number" id="totalNights" readonly>


<h3>Hotel Details</h3>

<div id="hotelSection">

<div class="hotel-box">

<label>City <span class="required">*</span></label>
<input type="text">

<label>Hotel Name</label>
<input type="text">

<label>Check-in</label>
<input type="date" class="checkin">

<label>Check-out</label>
<input type="date" class="checkout">

<label>Nights</label>
<input type="number" class="nights" readonly>

<label>Room Type</label>
<input type="text">

<label>Meal Plan</label>
<input type="text">

</div>

</div>


<button onclick="addHotel()">Add Another Hotel</button>


<h3>Vehicle Details</h3>

<input type="text" placeholder="Vehicle Type">

<input type="text" placeholder="Vehicle Model">

<input type="text" placeholder="Vehicle Number">

<input type="text" placeholder="Driver Name">

<input type="text" placeholder="Driver Mobile">


<h3>Payment</h3>

<input type="number" placeholder="Total Package Cost">

<input type="number" placeholder="Advance Paid">

<select>

<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>

</select>

<br>

<button>Generate Voucher</button>

</div>


<script>


// TOUR DATE LOGIC

const startDate = document.getElementById("tourStart");
const endDate = document.getElementById("tourEnd");
const nightsField = document.getElementById("totalNights");

startDate.addEventListener("change",function(){

endDate.min = startDate.value;

calculateNights();

});

endDate.addEventListener("change",calculateNights);

function calculateNights(){

if(startDate.value && endDate.value){

let start = new Date(startDate.value);
let end = new Date(endDate.value);

let diff = (end - start) / (1000*60*60*24);

nightsField.value = diff;

}

}


// ADD HOTEL

function addHotel(){

const section = document.getElementById("hotelSection");

const box = document.createElement("div");

box.classList.add("hotel-box");

box.innerHTML = `

<label>City</label>
<input type="text">

<label>Hotel Name</label>
<input type="text">

<label>Check-in</label>
<input type="date" class="checkin">

<label>Check-out</label>
<input type="date" class="checkout">

<label>Nights</label>
<input type="number" class="nights" readonly>

<label>Room Type</label>
<input type="text">

<label>Meal Plan</label>
<input type="text">

`;

section.appendChild(box);

}


</script>

</body>
</html>
