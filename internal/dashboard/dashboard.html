<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandR Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI;display:flex;background:#f1f5f9;}
.sidebar{width:250px;background:#0f172a;color:white;height:100vh;padding:20px;}
.sidebar button{width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px;background:#1e293b;color:white;cursor:pointer;}
.main{flex:1;padding:30px;}
.section{display:none;}
.section.active{display:block;}
.card{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
input,select{padding:8px;margin:5px;width:250px;}
button.submit{background:#1e3a8a;color:white;padding:8px 15px;border:none;border-radius:6px;}
table{border-collapse:collapse;width:100%;}
table th,table td{border:1px solid #ddd;padding:8px;}
</style>
</head>
<body>

<div class="sidebar">
<h2>PandR Admin</h2>
<button onclick="show('overview')">Overview</button>
<button onclick="show('payments')">Payments</button>
<button onclick="show('materials')">Materials</button>
<button onclick="show('ledger')">Ledger</button>
</div>

<div class="main">

<div id="overview" class="section active">
<div class="card">
<h3>Total Expense</h3>
<div id="totalExpense"></div>
</div>
<div class="card">
<h3>Papa Final Expense</h3>
<div id="papaExpense"></div>
</div>
<canvas id="chart"></canvas>
</div>

<div id="payments" class="section">
<div class="card">
<h3>Add Payment</h3>

<select id="type">
<option value="Expense">Expense</option>
<option value="Settlement">Settlement</option>
</select>

<input type="date" id="date">
<input placeholder="Paid By" id="paidBy">
<input placeholder="Settlement For" id="settlementFor">
<input placeholder="Vendor" id="vendor">
<input type="number" placeholder="Amount" id="amount">

<select id="mode" onchange="modeChange()">
<option value="">Mode</option>
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>

<input placeholder="Transaction ID" id="transactionId" style="display:none;">
<input placeholder="Cheque No" id="chequeNo" style="display:none;">
<input placeholder="Bank Name" id="bankName" style="display:none;">

<input placeholder="Remarks" id="remarks">

<button class="submit" onclick="addPayment()">Submit</button>
</div>
</div>

<div id="materials" class="section">
<div class="card">
<h3>Add Material</h3>

<input type="date" id="mdate">
<input placeholder="Vendor" id="mvendor">
<input placeholder="Material Name" id="material">
<input type="number" placeholder="Quantity" id="quantity">
<input placeholder="Unit" id="unit">
<input type="number" placeholder="Rate" id="rate">
<input placeholder="Remarks" id="mremarks">

<button class="submit" onclick="addMaterial()">Submit</button>
</div>
</div>

<div id="ledger" class="section">
<div class="card">
<h3>Ledger</h3>
<div id="ledgerTable"></div>
</div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwo78mV92MKxcGMSB52NziL7bmn0AsEplVo2rhj92O3UGk7EKl9B8OlJt9ZqbmXEE7JiQ/exec";

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function modeChange(){
transactionId.style.display="none";
chequeNo.style.display="none";
bankName.style.display="none";

if(mode.value==="UPI"||mode.value==="Bank Transfer")
transactionId.style.display="block";

if(mode.value==="Cheque"){
chequeNo.style.display="block";
bankName.style.display="block";
}
}

function loadDashboard(){
fetch(API,{method:"POST",body:JSON.stringify({action:"getDashboard"})})
.then(r=>r.json())
.then(d=>{
totalExpense.innerText="₹ "+d.totalExpense;
papaExpense.innerText="₹ "+d.papaFinalExpense;

const ctx=document.getElementById("chart").getContext("2d");
new Chart(ctx,{type:"bar",
data:{labels:Object.keys(d.ledger),
datasets:[{label:"Balance",data:Object.values(d.ledger),backgroundColor:"#1e3a8a"}]}});
renderLedger(d.ledger);
});
}

function renderLedger(l){
let html="<table><tr><th>Person</th><th>Balance</th></tr>";
for(let p in l) html+=`<tr><td>${p}</td><td>${l[p]}</td></tr>`;
html+="</table>";
ledgerTable.innerHTML=html;
}

function addPayment(){
fetch(API,{method:"POST",body:JSON.stringify({
action:"addPayment",
date:date.value,
type:type.value,
paidBy:paidBy.value,
settlementFor:settlementFor.value,
vendor:vendor.value,
amount:amount.value,
mode:mode.value,
transactionId:transactionId.value,
chequeNo:chequeNo.value,
bankName:bankName.value,
remarks:remarks.value
})})
.then(r=>r.json())
.then(()=>{alert("Added");loadDashboard();});
}

function addMaterial(){
fetch(API,{method:"POST",body:JSON.stringify({
action:"addMaterial",
date:mdate.value,
vendor:mvendor.value,
material:material.value,
quantity:quantity.value,
unit:unit.value,
rate:rate.value,
remarks:mremarks.value
})})
.then(r=>r.json())
.then(()=>alert("Material Added"));
}

loadDashboard();
</script>

</body>
</html>
