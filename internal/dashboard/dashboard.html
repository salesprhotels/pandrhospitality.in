<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandR Internal ERP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#eef2f7;}
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a;}
#loginScreen div{background:white;padding:30px;border-radius:10px;width:300px;}
#app{display:none;}
.sidebar{width:260px;background:#0f172a;color:white;height:100vh;padding:20px;float:left;}
.sidebar button{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px;background:#334155;color:white;cursor:pointer;}
.sidebar button:hover{background:#475569;}
.main{margin-left:280px;padding:30px;}
.section{display:none;}
.section.active{display:block;}
.card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,0.05);}
input,select{padding:6px;margin:5px;border-radius:6px;border:1px solid #ccc;}
button.primary{background:#2563eb;color:white;padding:8px 14px;border:none;border-radius:6px;}
table{border-collapse:collapse;width:100%;margin-top:10px;}
table th,table td{border:1px solid #ddd;padding:8px;text-align:left;}
.action{padding:4px 8px;border:none;border-radius:4px;color:white;cursor:pointer;}
.cancel{background:#dc2626;}
</style>
</head>

<body>

<div id="loginScreen">
<div>
<h3>Login</h3>
<input type="password" id="loginPass" placeholder="Enter Password" style="width:100%;padding:8px;">
<br><br>
<button class="primary" onclick="login()" style="width:100%;">Login</button>
</div>
</div>

<div id="app">

<div class="sidebar">
<h3>PandR ERP</h3>
<button onclick="show('overview')">Overview</button>
<button onclick="show('vendor')">Vendor Payment</button>
<button onclick="show('settlement')">Settlement</button>
<button onclick="show('materials')">Materials</button>
<button onclick="show('ledger')">Ledger</button>
<button onclick="show('reports')">Reports</button>
<button onclick="show('manage')">Manage</button>
</div>

<div class="main">

<!-- OVERVIEW -->
<div id="overview" class="section active">
<div class="card"><h3>Total Expense</h3><div id="totalExpense"></div></div>
<div class="card"><canvas id="monthlyChart"></canvas></div>
<div class="card"><canvas id="vendorChart"></canvas></div>
</div>

<!-- VENDOR -->
<div id="vendor" class="section">
<div class="card">
<h3>Add Vendor Payment</h3>
<input type="date" id="vdate">
<input placeholder="Vendor" id="vvendor">
<input placeholder="Category" id="vcategory">
<input placeholder="Paid By" id="vpaidBy">
<input type="number" placeholder="Amount" id="vamount">
<select id="vmode">
<option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Cheque</option>
</select>
<input placeholder="Transaction ID" id="vtransaction">
<input placeholder="Cheque No" id="vcheque">
<input placeholder="Bank Name" id="vbank">
<input placeholder="Remarks" id="vremarks">
<button class="primary" onclick="addVendor()">Submit</button>
</div>
</div>

<!-- SETTLEMENT -->
<div id="settlement" class="section">
<div class="card">
<h3>Add Settlement</h3>
<input type="date" id="sdate">
<input placeholder="Paid To" id="spaidTo">
<input placeholder="Paid By" id="spaidBy">
<input type="number" placeholder="Amount" id="samount">
<button class="primary" onclick="addSettlement()">Submit</button>
</div>
</div>

<!-- MATERIALS -->
<div id="materials" class="section">
<div class="card">
<h3>Add Material</h3>
<input type="date" id="mdate">
<input placeholder="Vendor" id="mvendor">
<input placeholder="Material" id="mmaterial">
<input type="number" placeholder="Quantity" id="mqty">
<input type="number" placeholder="Rate" id="mrate">
<button class="primary" onclick="addMaterial()">Submit</button>
</div>
</div>

<!-- LEDGER -->
<div id="ledger" class="section">
<div class="card">
<h3>Ledger</h3>
<div id="ledgerTable"></div>
</div>
</div>

<!-- REPORT -->
<div id="reports" class="section">
<div class="card">
<h3>Reports</h3>
<input type="date" id="rstart">
<input type="date" id="rend">
<button class="primary" onclick="loadReport()">Generate</button>
<button class="primary" onclick="exportExcel()">Excel</button>
<button class="primary" onclick="exportPDF()">PDF</button>
<div id="reportTable"></div>
</div>
</div>

<!-- MANAGE -->
<div id="manage" class="section">
<div class="card">
<h3>Manage Vendor Payments</h3>
<div id="manageTable"></div>
</div>
</div>

</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbwo78mV92MKxcGMSB52NziL7bmn0AsEplVo2rhj92O3UGk7EKl9B8OlJt9ZqbmXEE7JiQ/exec";
let USER_PASSWORD="";
let currentReportData=[];

function login(){
const pass=document.getElementById("loginPass").value;
fetch(API,{method:"POST",body:JSON.stringify({action:"getDashboard",password:pass})})
.then(r=>r.json())
.then(d=>{
if(d.status==="unauthorized"){alert("Wrong Password");}
else{
USER_PASSWORD=pass;
document.getElementById("loginScreen").style.display="none";
document.getElementById("app").style.display="block";
loadDashboard();
}
});
}

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function api(data){
data.password=USER_PASSWORD;
return fetch(API,{method:"POST",body:JSON.stringify(data)}).then(r=>r.json());
}

function loadDashboard(){
api({action:"getDashboard"}).then(d=>{
totalExpense.innerText="₹ "+d.totalExpense;
});
api({action:"getAdvancedDashboard"}).then(d=>{
new Chart(monthlyChart,{type:"line",data:{labels:Object.keys(d.monthly),datasets:[{label:"Monthly Expense",data:Object.values(d.monthly)}]}});
new Chart(vendorChart,{type:"bar",data:{labels:Object.keys(d.vendorWise),datasets:[{label:"Vendor Expense",data:Object.values(d.vendorWise)}]}});
});
renderLedger();
loadManage();
}

function addVendor(){
api({action:"addVendorPayment",date:vdate.value,vendor:vvendor.value,category:vcategory.value,paidBy:vpaidBy.value,amount:vamount.value,mode:vmode.value,transactionId:vtransaction.value,chequeNo:vcheque.value,bankName:vbank.value,remarks:vremarks.value})
.then(()=>loadDashboard());
}

function addSettlement(){
api({action:"addSettlement",date:sdate.value,paidTo:spaidTo.value,paidBy:spaidBy.value,amount:samount.value})
.then(()=>loadDashboard());
}

function addMaterial(){
api({action:"addMaterial",date:mdate.value,vendor:mvendor.value,material:mmaterial.value,quantity:mqty.value,rate:mrate.value})
.then(()=>loadDashboard());
}

function renderLedger(){
api({action:"getLedger"}).then(d=>{
let html="<table><tr><th>Person</th><th>Balance</th></tr>";
for(let p in d){html+=`<tr><td>${p}</td><td>${d[p]}</td></tr>`;}
html+="</table>";
ledgerTable.innerHTML=html;
});
}

function loadReport(){
api({action:"getReportData",startDate:rstart.value,endDate:rend.value})
.then(d=>{
currentReportData=d;
let html="<table><tr><th>ID</th><th>Date</th><th>Vendor</th><th>Amount</th></tr>";
d.forEach(row=>{html+=`<tr><td>${row[0]}</td><td>${new Date(row[1]).toLocaleDateString()}</td><td>${row[2]}</td><td>${row[5]}</td></tr>`;});
html+="</table>";
reportTable.innerHTML=html;
});
}

function exportExcel(){
const ws=XLSX.utils.aoa_to_sheet(currentReportData);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Report");
XLSX.writeFile(wb,"Report.xlsx");
}

function exportPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
let y=10;
currentReportData.forEach(r=>{doc.text(`${r[0]} | ${r[2]} | ${r[5]}`,10,y);y+=8;});
doc.save("Report.pdf");
}

function loadManage(){
api({action:"getReportData",startDate:"2000-01-01",endDate:"2100-01-01"})
.then(d=>{
let html="<table><tr><th>ID</th><th>Vendor</th><th>Amount</th><th>Action</th></tr>";
d.forEach(r=>{
html+=`<tr><td>${r[0]}</td><td>${r[2]}</td><td>${r[5]}</td><td><button class='action cancel' onclick="cancelEntry('${r[0]}')">Cancel</button></td></tr>`;
});
html+="</table>";
manageTable.innerHTML=html;
});
}

function cancelEntry(id){
api({action:"cancelVendorPayment",entryId:id}).then(()=>loadDashboard());
}

</script>

</body>
</html>
