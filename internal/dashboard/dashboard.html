<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandR Internal ERP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f6fb;
}

#loginScreen{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
}

#loginScreen div{
  background:white;
  padding:35px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

#app{display:none;}

.sidebar{
  width:260px;
  background:#0f172a;
  color:white;
  height:100vh;
  padding:25px;
  float:left;
}

.sidebar h3{
  color:#facc15;
  margin-bottom:25px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover{
  background:#facc15;
  color:#0f172a;
  font-weight:600;
}

.main{
  margin-left:280px;
  padding:35px;
}

.section{display:none;}
.section.active{display:block;}

.card{
  background:white;
  padding:25px;
  border-radius:14px;
  margin-bottom:25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

input,select{
  padding:8px 10px;
  margin:6px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

button.primary{
  background:#0f172a;
  color:white;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button.primary:hover{
  background:#facc15;
  color:#0f172a;
}

table{
  border-collapse:collapse;
  width:100%;
  margin-top:15px;
}

table th{
  background:#0f172a;
  color:white;
  padding:10px;
}

table td{
  padding:8px;
  border-bottom:1px solid #eee;
}

.balance-positive{color:#16a34a;font-weight:600;}
.balance-negative{color:#dc2626;font-weight:600;}
</style>
</head>

<body>

<div id="loginScreen">
<div>
<h3>Login</h3>
<input type="password" id="loginPass" placeholder="Enter Password" style="width:100%;padding:8px;">
<br><br>
<button class="primary" onclick="login()" style="width:100%;">Login</button>
</div>
</div>

<div id="app">

<div class="sidebar">
<h3>PandR ERP</h3>
<button onclick="show('overview')">Overview</button>
<button onclick="show('vendor')">Vendor Payment</button>
<button onclick="show('settlement')">Settlement</button>
<button onclick="show('materials')">Materials</button>
<button onclick="show('ledger')">Ledger</button>
<button onclick="show('reports')">Reports</button>
<button onclick="show('manage')">Manage</button>
</div>

<div class="main">

<div id="overview" class="section active">
<div class="card"><h3>Total Expense</h3><div id="totalExpense"></div></div>
<div class="card"><canvas id="monthlyChart"></canvas></div>
<div class="card"><canvas id="vendorChart"></canvas></div>
</div>

<div id="vendor" class="section">
<div class="card">
<h3>Add Vendor Payment</h3>
<input type="date" id="vdate">
<input placeholder="Vendor" id="vvendor">
<input placeholder="Category" id="vcategory">
<input placeholder="Paid By" id="vpaidBy">
<input type="number" placeholder="Amount" id="vamount">
<select id="vmode">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>
<input placeholder="Transaction ID" id="vtransaction">
<input placeholder="Cheque No" id="vcheque">
<input placeholder="Bank Name" id="vbank">
<input placeholder="Remarks" id="vremarks">
<button class="primary" onclick="addVendor()">Submit</button>
</div>
</div>

<div id="settlement" class="section">
<div class="card">
<h3>Add Settlement</h3>
<input type="date" id="sdate">
<input placeholder="Paid To" id="spaidTo">
<input placeholder="Paid By" id="spaidBy">
<input type="number" placeholder="Amount" id="samount">
<button class="primary" onclick="addSettlement()">Submit</button>
</div>
</div>

<div id="materials" class="section">
<div class="card">
<h3>Add Material</h3>
<input type="date" id="mdate">
<input placeholder="Vendor" id="mvendor">
<input placeholder="Material" id="mmaterial">
<input type="number" placeholder="Quantity" id="mqty">
<input type="number" placeholder="Rate" id="mrate">
<button class="primary" onclick="addMaterial()">Submit</button>
</div>
</div>

<div id="ledger" class="section">
<div class="card">
<h3>Ledger</h3>
<div id="ledgerTable"></div>
</div>
</div>

<div id="reports" class="section">
<div class="card">
<h3>Reports</h3>
<input type="date" id="rstart">
<input type="date" id="rend">
<button class="primary" onclick="loadReport()">Generate</button>
<button class="primary" onclick="exportExcel()">Excel</button>
<button class="primary" onclick="exportPDF()">PDF</button>
<div id="reportTable"></div>
</div>
</div>

<div id="manage" class="section">
<div class="card">
<h3>Manage Vendor Payments</h3>
<div id="manageTable"></div>
</div>
</div>

</div>
</div>


<script>

const API="https://script.google.com/macros/s/AKfycbwo78mV92MKxcGMSB52NziL7bmn0AsEplVo2rhj92O3UGk7EKl9B8OlJt9ZqbmXEE7JiQ/exec";

let USER_PASSWORD="";
let currentReportData=[];

/* ================= LOGIN ================= */

function login(){
const pass=document.getElementById("loginPass").value.trim();

fetch(API,{
  method:"POST",
  body:JSON.stringify({action:"getDashboard",password:pass})
})
.then(r=>r.json())
.then(d=>{
if(d.status==="unauthorized"){
  alert("Wrong Password");
}else{
  USER_PASSWORD=pass;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
  loadDashboard();
}
});
}

/* ================= COMMON API ================= */

function api(data){
data.password=USER_PASSWORD;
return fetch(API,{
  method:"POST",
  body:JSON.stringify(data)
}).then(r=>r.json());
}

/* ================= SUCCESS POPUP ================= */

function successMessage(msg){
alert(msg);
}

/* ================= CLEAR FORM ================= */

function clearVendorForm(){
vdate.value="";
vvendor.value="";
vcategory.value="";
vpaidBy.value="";
vamount.value="";
vmode.value="Cash";
vtransaction.value="";
vcheque.value="";
vbank.value="";
vremarks.value="";
}

function clearSettlementForm(){
sdate.value="";
spaidTo.value="";
spaidBy.value="";
samount.value="";
}

function clearMaterialForm(){
mdate.value="";
mvendor.value="";
mmaterial.value="";
mqty.value="";
mrate.value="";
}

/* ================= DASHBOARD ================= */

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function loadDashboard(){

api({action:"getDashboard"})
.then(d=>{
totalExpense.innerText="₹ "+d.totalExpense;
});

api({action:"getAdvancedDashboard"})
.then(d=>{

if(window.monthlyChartInstance){
  window.monthlyChartInstance.destroy();
}
if(window.vendorChartInstance){
  window.vendorChartInstance.destroy();
}

window.monthlyChartInstance=new Chart(monthlyChart,{
type:"line",
data:{
labels:Object.keys(d.monthly),
datasets:[{
label:"Monthly Expense",
data:Object.values(d.monthly),
borderColor:"#0f172a",
backgroundColor:"rgba(250,204,21,0.3)"
}]
}
});

window.vendorChartInstance=new Chart(vendorChart,{
type:"bar",
data:{
labels:Object.keys(d.vendorWise),
datasets:[{
label:"Vendor Expense",
data:Object.values(d.vendorWise),
backgroundColor:"#facc15"
}]
}
});

});

renderLedger();
loadManage();
}

/* ================= ADD VENDOR ================= */

function addVendor(){

if(!vdate.value || !vvendor.value || !vamount.value){
alert("Please fill required fields");
return;
}

api({
action:"addVendorPayment",
date:vdate.value,
vendor:vvendor.value,
category:vcategory.value,
paidBy:vpaidBy.value,
amount:vamount.value,
mode:vmode.value,
transactionId:vtransaction.value,
chequeNo:vcheque.value,
bankName:vbank.value,
remarks:vremarks.value
})
.then(res=>{
if(res.status==="success"){
successMessage("Vendor Payment Submitted Successfully");
clearVendorForm();
loadDashboard();
}else{
alert("Something went wrong");
}
});
}

/* ================= ADD SETTLEMENT ================= */

function addSettlement(){

if(!sdate.value || !spaidTo.value || !samount.value){
alert("Please fill required fields");
return;
}

api({
action:"addSettlement",
date:sdate.value,
paidTo:spaidTo.value,
paidBy:spaidBy.value,
amount:samount.value
})
.then(res=>{
if(res.status==="success"){
successMessage("Settlement Submitted Successfully");
clearSettlementForm();
loadDashboard();
}
});
}

/* ================= ADD MATERIAL ================= */

function addMaterial(){

if(!mdate.value || !mmaterial.value || !mqty.value){
alert("Please fill required fields");
return;
}

api({
action:"addMaterial",
date:mdate.value,
vendor:mvendor.value,
material:mmaterial.value,
quantity:mqty.value,
rate:mrate.value
})
.then(res=>{
if(res.status==="success"){
successMessage("Material Submitted Successfully");
clearMaterialForm();
}
});
}

/* ================= LEDGER ================= */

function renderLedger(){
api({action:"getLedger"}).then(d=>{
let html="<table><tr><th>Person</th><th>Balance</th></tr>";
for(let p in d){
let cls=d[p]>=0?"balance-positive":"balance-negative";
html+=`<tr><td>${p}</td><td class="${cls}">₹ ${d[p]}</td></tr>`;
}
html+="</table>";
ledgerTable.innerHTML=html;
});
}

/* ================= REPORT ================= */

function loadReport(){
api({
action:"getReportData",
startDate:rstart.value,
endDate:rend.value
})
.then(d=>{
currentReportData=d;
let html="<table><tr><th>ID</th><th>Date</th><th>Vendor</th><th>Amount</th></tr>";
d.forEach(r=>{
html+=`<tr>
<td>${r[0]}</td>
<td>${new Date(r[1]).toLocaleDateString()}</td>
<td>${r[2]}</td>
<td>${r[5]}</td>
</tr>`;
});
html+="</table>";
reportTable.innerHTML=html;
});
}

/* ================= EXPORT ================= */

function exportExcel(){
const ws=XLSX.utils.aoa_to_sheet(currentReportData);
const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Report");
XLSX.writeFile(wb,"Report.xlsx");
}

function exportPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
let y=10;
currentReportData.forEach(r=>{
doc.text(`${r[0]} | ${r[2]} | ${r[5]}`,10,y);
y+=8;
});
doc.save("Report.pdf");
}

/* ================= MANAGE ================= */

function loadManage(){
api({
action:"getReportData",
startDate:"2000-01-01",
endDate:"2100-01-01"
})
.then(d=>{
let html="<table><tr><th>ID</th><th>Vendor</th><th>Amount</th><th>Action</th></tr>";
d.forEach(r=>{
html+=`<tr>
<td>${r[0]}</td>
<td>${r[2]}</td>
<td>${r[5]}</td>
<td><button class="primary" onclick="cancelEntry('${r[0]}')">Cancel</button></td>
</tr>`;
});
html+="</table>";
manageTable.innerHTML=html;
});
}

function cancelEntry(id){
if(confirm("Are you sure you want to cancel this entry?")){
api({action:"cancelVendorPayment",entryId:id})
.then(()=>loadDashboard());
}
}

</script>
</body>
</html>
