<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandR Internal ERP</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f6fb;}
#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e3a8a);}
#loginScreen div{background:white;padding:35px;border-radius:12px;width:320px;}
#app{display:none;}
.sidebar{width:260px;background:#0f172a;color:white;height:100vh;padding:25px;float:left;}
.sidebar h3{color:#facc15;margin-bottom:25px;}
.sidebar button{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#1e293b;color:white;cursor:pointer;}
.sidebar button:hover{background:#facc15;color:#0f172a;}
.main{margin-left:280px;padding:35px;}
.section{display:none;}
.section.active{display:block;}
.card{background:white;padding:25px;border-radius:14px;margin-bottom:25px;box-shadow:0 8px 25px rgba(0,0,0,0.05);}
input,select{padding:8px;margin:6px;border-radius:8px;border:1px solid #ccc;}
button.primary{background:#0f172a;color:white;padding:10px 16px;border:none;border-radius:8px;cursor:pointer;}
button.primary:hover{background:#facc15;color:#0f172a;}
table{border-collapse:collapse;width:100%;margin-top:15px;}
table th{background:#0f172a;color:white;padding:10px;}
table td{padding:8px;border-bottom:1px solid #eee;}
.balance-positive{color:#16a34a;font-weight:600;}
.balance-negative{color:#dc2626;font-weight:600;}
</style>
</head>

<body>

<div id="loginScreen">
<div>
<h3>Login</h3>
<input type="password" id="loginPass" placeholder="Enter Password" style="width:100%;padding:8px;">
<br><br>
<button class="primary" style="width:100%;" onclick="login()">Login</button>
</div>
</div>

<div id="app">

<div class="sidebar">
<h3>PandR ERP</h3>
<button onclick="show('overview')">Overview</button>
<button onclick="show('vendor')">Vendor Payment</button>
<button onclick="show('settlement')">Settlement</button>
<button onclick="show('ledger')">Ledger</button>
<button onclick="show('reports')">Reports</button>
<button onclick="show('manage')">Manage</button>
</div>

<div class="main">

<!-- OVERVIEW -->
<div id="overview" class="section active">

<div class="card">
<h3>Total Project Cost</h3>
<div id="totalExpense"></div>
</div>

<div class="card">
<h3>Total Settled</h3>
<div id="totalSettled"></div>
</div>

<div class="card">
<h3>Papa Final Ownership</h3>
<div id="papaExpense"></div>
</div>

<div class="card">
<h3>Others Outstanding</h3>
<div id="othersOutstanding"></div>
</div>

<div class="card">
<canvas id="monthlyChart"></canvas>
</div>

<div class="card">
<canvas id="vendorChart"></canvas>
</div>

</div>

<!-- VENDOR -->
<div id="vendor" class="section">
<div class="card">
<h3>Add Vendor Payment</h3>
<input type="date" id="vdate">
<input placeholder="Vendor" id="vvendor">
<input placeholder="Category" id="vcategory">
<input placeholder="Paid By" id="vpaidBy">
<input type="number" placeholder="Amount" id="vamount">
<select id="vmode">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>
<input placeholder="Transaction ID" id="vtransaction">
<input placeholder="Cheque No" id="vcheque">
<input placeholder="Bank Name" id="vbank">
<input placeholder="Remarks" id="vremarks">
<button class="primary" onclick="addVendor()">Submit</button>
</div>
</div>

<!-- SETTLEMENT -->
<div id="settlement" class="section">
<div class="card">
<h3>Add Settlement</h3>
<input type="date" id="sdate">
<input placeholder="Paid To" id="spaidTo">
<input placeholder="Paid By" id="spaidBy">
<input type="number" placeholder="Amount" id="samount">
<select id="smode">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>
<input placeholder="Transaction ID" id="stransaction">
<input placeholder="Cheque No" id="scheque">
<input placeholder="Bank Name" id="sbank">
<input placeholder="Remarks" id="sremarks">
<button class="primary" onclick="addSettlement()">Submit</button>
</div>
</div>

<!-- LEDGER -->
<div id="ledger" class="section">
<div class="card">
<h3>Ledger</h3>
<div id="ledgerTable"></div>
</div>
</div>

<!-- REPORT -->
<div id="reports" class="section">
<div class="card">
<h3>Reports</h3>
<input type="date" id="rstart">
<input type="date" id="rend">
<button class="primary" onclick="loadReport()">Generate</button>
<button class="primary" onclick="exportExcel()">Excel</button>
<button class="primary" onclick="exportPDF()">PDF</button>
<div id="reportTable"></div>
</div>
</div>

<!-- MANAGE -->
<div id="manage" class="section">
<div class="card">
<h3>Manage Vendor Payments</h3>
<div id="manageTable"></div>
</div>
</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwo78mV92MKxcGMSB52NziL7bmn0AsEplVo2rhj92O3UGk7EKl9B8OlJt9ZqbmXEE7JiQ/exec";
let USER_PASSWORD="";
let currentReportData=[];

function login(){
const pass=loginPass.value.trim();
fetch(API,{method:"POST",body:JSON.stringify({action:"getDashboard",password:pass})})
.then(r=>r.json())
.then(d=>{
if(d.status==="unauthorized"){alert("Wrong Password");}
else{USER_PASSWORD=pass;loginScreen.style.display="none";app.style.display="block";loadDashboard();}
});
}

function api(data){
data.password=USER_PASSWORD;
return fetch(API,{method:"POST",body:JSON.stringify(data)}).then(r=>r.json());
}

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function loadDashboard(){
api({action:"getDashboard"}).then(d=>{
totalExpense.innerText="₹ "+d.totalExpense;
totalSettled.innerText="₹ "+d.totalSettled;
papaExpense.innerText="₹ "+d.papaExpense;
othersOutstanding.innerText="₹ "+d.othersOutstanding;
});
renderLedger();
}

/* ===== ADD SETTLEMENT FULL STRUCTURE ===== */
function addSettlement(){
if(!sdate.value||!spaidTo.value||!samount.value){alert("Fill required fields");return;}

api({
action:"addSettlement",
date:sdate.value,
paidTo:spaidTo.value,
paidBy:spaidBy.value,
amount:samount.value,
mode:smode.value,
transactionId:stransaction.value,
chequeNo:scheque.value,
bankName:sbank.value,
remarks:sremarks.value
})
.then(res=>{
if(res.status==="success"){
alert("Settlement Submitted Successfully");
sdate.value=spaidTo.value=spaidBy.value=samount.value=stransaction.value=scheque.value=sbank.value=sremarks.value="";
loadDashboard();
}
});
}

function renderLedger(){
api({action:"getLedger"}).then(d=>{
let html="<table><tr><th>Person</th><th>Balance</th></tr>";
for(let p in d){
let cls=d[p]>=0?"balance-positive":"balance-negative";
html+=`<tr><td>${p}</td><td class="${cls}">₹ ${d[p]}</td></tr>`;
}
html+="</table>";
ledgerTable.innerHTML=html;
});
}

</script>

</body>
</html>
