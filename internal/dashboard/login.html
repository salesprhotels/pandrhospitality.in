<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandR Internal Login</title>
<style>
body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.login-box{
  background:white;
  padding:40px;
  border-radius:10px;
  width:350px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  text-align:center;
}
h2{
  margin-bottom:20px;
  color:#1e293b;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e3a8a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#1e40af;
}
.error{
  color:red;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>PandR Dashboard</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="login()">Login</button>
  <div class="error" id="error"></div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwo78mV92MKxcGMSB52NziL7bmn0AsEplVo2rhj92O3UGk7EKl9B8OlJt9ZqbmXEE7JiQ/exec";

function login(){

  const pass = document.getElementById("password").value;

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      password:pass
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="success"){
      localStorage.setItem("auth","true");
      window.location.href="dashboard.html";
    }else{
      document.getElementById("error").innerText="Wrong Password";
    }
  });
}

</script>

</body>
</html>
