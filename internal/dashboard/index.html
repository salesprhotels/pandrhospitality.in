<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandR Construction ERP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>PandR ERP Login</h2>
    <input type="password" id="loginPassword" placeholder="Enter Password">
    <button onclick="login()">Login</button>
    <p id="loginError" style="color:red;"></p>
  </div>
</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
  <h2>PandR ERP</h2>
  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('material')">Material</button>
  <button onclick="showSection('vendor')">Vendor</button>
  <button onclick="showSection('settlement')">Settlement</button>
  <button onclick="showSection('report')">Report</button>
  <button onclick="showSection('ledger')">Ledger</button>
</div>

<!-- MAIN -->

<div class="main" id="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="card">
<h3>Total Expense</h3>
<div id="totalExpense" class="green"></div>
</div>

<div class="card">
<h3>Total Settled</h3>
<div id="totalSettled" class="green"></div>
</div>

<div class="card">
<h3>Papa Ownership</h3>
<div id="papaExpense" class="red"></div>
</div>

<div class="card">
<h3>Outstanding (Others)</h3>
<div id="outstandingAmount" class="red"></div>
</div>

</div>

<!-- MATERIAL SECTION (CONSTRUCTION MODE) -->

<div id="material" class="section">

<div class="card">
<h3>Add Construction Material</h3>

<div class="form-row">

<input type="date" id="mDate">

<!-- CATEGORY -->
<select id="mCategory" onchange="loadMaterialItems()">
<option value="">Select Category</option>
<option>Structural</option>
<option>Electrical</option>
<option>Plumbing</option>
<option>Finishing</option>
<option>Furniture</option>
<option>Miscellaneous</option>
</select>

<!-- ITEM -->
<select id="mItem" onchange="handleMaterialLogic()">
<option value="">Select Item</option>
</select>

<!-- TMT SIZE (Hidden by default) -->
<select id="mSize" style="display:none;">
<option value="">Select Size</option>
<option>8mm</option>
<option>10mm</option>
<option>12mm</option>
<option>16mm</option>
<option>20mm</option>
<option>25mm</option>
</select>

<!-- VEHICLE TYPE (Hidden by default) -->
<select id="mVehicle" style="display:none;">
<option value="">Vehicle Type</option>
<option>Dumper</option>
<option>Truck</option>
<option>Trolley</option>
<option>Pickup</option>
</select>

<!-- QUANTITY -->
<input type="number" id="mQty" placeholder="Quantity" oninput="calculateMaterialTotal()">

<!-- UNIT (Auto Controlled) -->
<input id="mUnit" placeholder="Unit" readonly>

<!-- RATE -->
<input type="number" id="mRate" placeholder="Rate" oninput="calculateMaterialTotal()">

<!-- TOTAL -->
<input id="mTotal" placeholder="Total" readonly>

<!-- VENDOR -->
<input id="mVendor" placeholder="Vendor">

<!-- PAID BY -->
<input id="mPaidBy" placeholder="Paid By">

<!-- PAYMENT MODE -->
<select id="mMode" onchange="handlePaymentMode('m')">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>

<input id="mTransaction" placeholder="Transaction ID" style="display:none">
<input id="mCheque" placeholder="Cheque No" style="display:none">
<input id="mBank" placeholder="Bank Name" style="display:none">

<input id="mRemarks" placeholder="Remarks">

<button class="btn-primary" onclick="addMaterial()">Submit</button>

</div>
</div>

<div class="card">
<h3>Material Records</h3>
<div id="materialTable"></div>
</div>

</div>

<!-- VENDOR -->

<div id="vendor" class="section">

<div class="card">
<h3>Add Vendor Payment</h3>

<div class="form-row">
<input type="date" id="vDate">
<input id="vVendor" placeholder="Vendor">
<input id="vCategory" placeholder="Category">
<input id="vPaidBy" placeholder="Paid By">
<input type="number" id="vAmount" placeholder="Amount">

<select id="vMode" onchange="handlePaymentMode('v')">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>

<input id="vTransaction" placeholder="Transaction ID" style="display:none">
<input id="vCheque" placeholder="Cheque No" style="display:none">
<input id="vBank" placeholder="Bank Name" style="display:none">
<input id="vRemarks" placeholder="Remarks">

<button class="btn-primary" onclick="addVendor()">Submit</button>
</div>
</div>

<div class="card">
<h3>Vendor Records</h3>
<div id="vendorTable"></div>
</div>

</div>

<!-- SETTLEMENT -->

<div id="settlement" class="section">

<div class="card">
<h3>Add Settlement</h3>

<div class="form-row">
<input type="date" id="sDate">
<input id="sPaidTo" placeholder="Paid To">
<input id="sPaidBy" placeholder="Paid By">
<input type="number" id="sAmount" placeholder="Amount">

<select id="sMode" onchange="handlePaymentMode('s')">
<option>Cash</option>
<option>UPI</option>
<option>Bank Transfer</option>
<option>Cheque</option>
</select>

<input id="sTransaction" placeholder="Transaction ID" style="display:none">
<input id="sCheque" placeholder="Cheque No" style="display:none">
<input id="sBank" placeholder="Bank Name" style="display:none">
<input id="sRemarks" placeholder="Remarks">

<button class="btn-primary" onclick="addSettlement()">Submit</button>
</div>
</div>

<div class="card">
<h3>Settlement Records</h3>
<div id="settlementTable"></div>
</div>

</div>

<!-- REPORT -->

<div id="report" class="section">

<div class="card">
<h3>Date Wise Report</h3>

From <input type="date" id="rFrom">
To <input type="date" id="rTo">

<button class="btn-primary" onclick="loadReport()">Filter</button>
<button class="btn-primary" onclick="exportExcel()">Export Excel</button>
<button class="btn-primary" onclick="exportPDF()">Export PDF</button>

<div id="reportTable"></div>
</div>

</div>

<!-- LEDGER -->

<div id="ledger" class="section">

<div class="card">
<h3>Ledger</h3>
<div id="ledgerTable"></div>
</div>

</div>

</div>

<!-- EDIT MODAL -->

<div class="modal" id="editModal">
<div class="modal-content">
<h3>Edit Entry</h3>
<div id="editFormContainer"></div>
<button class="btn-primary" onclick="saveEdit()">Save</button>
<button class="btn-cancel" onclick="closeModal()">Cancel</button>
</div>
</div>

<script src="app.js"></script>

</body>
</html>
