<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Construction Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#f4f6f9;
}
.sidebar{
  width:230px;
  background:#1e293b;
  color:white;
  padding:20px;
  height:100vh;
}
.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#334155;
  border:none;
  color:white;
  cursor:pointer;
}
.main{
  flex:1;
  padding:30px;
}
.section{display:none;}
.section.active{display:block;}
input,select{
  display:block;
  margin:10px 0;
  padding:8px;
  width:300px;
}
button.submit{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 15px;
}
.hidden{display:none;}
canvas{max-width:600px;}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Dashboard</h2>
  <button onclick="showSection('overview')">Overview</button>
  <button onclick="showSection('payment')">Payments</button>
  <button onclick="showSection('material')">Materials</button>
</div>

<div class="main">

<div id="overview" class="section active">
  <h2>Project Overview</h2>
  <canvas id="chart"></canvas>
</div>

<div id="payment" class="section">
  <h2>Add Payment</h2>

  <input type="date" id="paymentDate">
  <input placeholder="Paid By" id="paidBy">
  <input placeholder="Vendor Type" id="vendorType">
  <input placeholder="Vendor Name" id="vendorName">
  <input placeholder="Category" id="category">
  <input type="number" placeholder="Amount" id="amount">

  <select id="paymentMode" onchange="toggleMode()">
    <option value="">Payment Mode</option>
    <option value="Cash">Cash</option>
    <option value="UPI">UPI</option>
    <option value="Bank">Bank</option>
    <option value="Cheque">Cheque</option>
  </select>

  <div id="transactionBox" class="hidden">
    <input placeholder="Transaction ID" id="transactionId">
  </div>

  <div id="chequeBox" class="hidden">
    <input placeholder="Cheque No" id="chequeNo">
    <input placeholder="Bank Name" id="bankName">
  </div>

  <input type="file" id="billFile">
  <input placeholder="Remarks" id="remarks">

  <button class="submit" onclick="submitPayment()">Submit Payment</button>
</div>

<div id="material" class="section">
  <h2>Add Material</h2>

  <input type="date" id="purchaseDate">
  <input placeholder="Vendor Name" id="mVendor">
  <input placeholder="Material Name" id="materialName">
  <input type="number" placeholder="Quantity" id="quantity">
  <input placeholder="Unit" id="unit">
  <input type="number" placeholder="Rate" id="rate">
  <input placeholder="Remarks" id="mRemarks">

  <button class="submit" onclick="submitMaterial()">Submit Material</button>
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwo78mV92MKxcGMSB52NziL7bmn0AsEplVo2rhj92O3UGk7EKl9B8OlJt9ZqbmXEE7JiQ/exec";

function showSection(id){
  document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleMode(){
  document.getElementById("transactionBox").classList.add("hidden");
  document.getElementById("chequeBox").classList.add("hidden");

  const mode = document.getElementById("paymentMode").value;

  if(mode==="UPI" || mode==="Bank"){
    document.getElementById("transactionBox").classList.remove("hidden");
  }

  if(mode==="Cheque"){
    document.getElementById("chequeBox").classList.remove("hidden");
  }
}

async function submitPayment(){

  if(!paymentDate.value || !paidBy.value || !vendorName.value || !amount.value || !paymentMode.value){
    alert("Please fill required fields");
    return;
  }

  let base64=null,name="",type="";

  if(billFile.files.length>0){
    const file=billFile.files[0];
    name=file.name;
    type=file.type;
    base64=(await toBase64(file)).split(",")[1];
  }

  const payload={
    action:"addPayment",
    paymentDate:paymentDate.value,
    paidBy:paidBy.value,
    vendorType:vendorType.value,
    vendorName:vendorName.value,
    category:category.value,
    amount:amount.value,
    paymentMode:paymentMode.value,
    transactionId:transactionId.value,
    chequeNo:chequeNo.value,
    bankName:bankName.value,
    billBase64:base64,
    billName:name,
    billType:type,
    remarks:remarks.value
  };

  fetch(API,{method:"POST",body:JSON.stringify(payload)})
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      alert("Payment Added");
      document.querySelectorAll("#payment input").forEach(i=>i.value="");
    }else{
      alert(res.message);
    }
  });
}

async function submitMaterial(){

  if(!purchaseDate.value || !mVendor.value || !materialName.value || !quantity.value || !rate.value){
    alert("Please fill required fields");
    return;
  }

  const payload={
    action:"addMaterial",
    purchaseDate:purchaseDate.value,
    vendorName:mVendor.value,
    materialName:materialName.value,
    quantity:quantity.value,
    unit:unit.value,
    rate:rate.value,
    remarks:mRemarks.value
  };

  fetch(API,{method:"POST",body:JSON.stringify(payload)})
  .then(r=>r.json())
  .then(res=>{
    if(res.status==="success"){
      alert("Material Added");
      document.querySelectorAll("#material input").forEach(i=>i.value="");
    }else{
      alert(res.message);
    }
  });
}

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>resolve(reader.result);
    reader.onerror=error=>reject(error);
  });
}

</script>

</body>
</html>
