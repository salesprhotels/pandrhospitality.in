<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
  <h2>Dashboard</h2>
  <button onclick="showSection('dashboard')">Overview</button>
  <button onclick="showSection('payment')">Payments</button>
</div>

<div class="main">

  <div id="dashboard" class="section">
    <h1>Project Summary</h1>
    <canvas id="paymentChart"></canvas>
  </div>

  <div id="payment" class="section hidden">
    <h1>Add Payment</h1>

    <input type="date" id="paymentDate">
    <input placeholder="Paid By" id="paidBy">
    <input placeholder="Vendor Name" id="vendorName">
    <input type="number" placeholder="Amount" id="amount">

    <input type="file" id="billFile">

    <button onclick="submitPayment()">Submit</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
