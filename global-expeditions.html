<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Expeditions | Yes We Care Travels</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
}

/* HEADER */

header{
background:#0b2a4a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

/* LANGUAGE */

.language{
position:relative;
}

.language button{
background:#4b3fd6;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

.language-menu{
display:none;
position:absolute;
right:0;
top:35px;
background:white;
color:black;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.language-menu div{
padding:10px;
cursor:pointer;
}

.language:hover .language-menu{
display:block;
}

/* HERO */

.hero{
background:#4b3fd6;
color:white;
text-align:center;
padding:70px 20px;
}

.search{
margin-top:20px;
}

.search input{
padding:12px;
width:260px;
border:none;
border-radius:4px;
}

/* SECTION */

.section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* FILTER */

.filter{
margin-bottom:20px;
}

.filter button{
margin:5px;
padding:8px 12px;
border:none;
background:#ddd;
cursor:pointer;
}

/* DESTINATIONS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:8px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card div{
padding:15px;
}

/* TOUR CARD */

.tour{
background:white;
margin-top:20px;
padding:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.price{
color:#4b3fd6;
font-weight:bold;
}

button{
background:#4b3fd6;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
margin-top:10px;
}

.itinerary{
display:none;
background:#eef1ff;
padding:12px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">
Yes We Care Travels
</div>

<div class="language">

<button>🌐 Language</button>

<div class="language-menu">

<div>🇬🇧 English</div>
<div>🇪🇸 Spanish</div>
<div>🇫🇷 French</div>
<div>🇩🇪 German</div>
<div>🇮🇳 Hindi</div>

</div>

</div>

</header>

<section class="hero">

<h1>Global Expeditions</h1>

<p>Explore curated international tours</p>

<div class="search">

<input id="search" placeholder="Search destination or tour">

</div>

</section>

<section class="section">

<h2>Destinations</h2>

<div class="grid">

<div class="card" onclick="showTours('peru')">

<img src="images/peru.jpg">

<div>

<h3>Peru</h3>

<p>Machu Picchu & Andes</p>

</div>

</div>

<div class="card" onclick="showTours('thailand')">

<img src="images/thailand.jpg">

<div>

<h3>Thailand</h3>

<p>Bangkok & Islands</p>

</div>

</div>

<div class="card" onclick="showTours('dubai')">

<img src="images/dubai.jpg">

<div>

<h3>Dubai</h3>

<p>Luxury Desert Tours</p>

</div>

</div>

</div>

<div class="filter">

<h3>Filter by Duration</h3>

<button onclick="filterTours('all')">All</button>
<button onclick="filterTours('4')">4 Days</button>
<button onclick="filterTours('5')">5 Days</button>
<button onclick="filterTours('6')">6 Days</button>
<button onclick="filterTours('7')">7 Days</button>

</div>

<div id="tours"></div>

</section>

<script>

const tours={

peru:[
{name:"Cusco Explorer",days:"4",price:"$950"},
{name:"Sacred Valley",days:"5",price:"$1100"},
{name:"Machu Picchu Classic",days:"6",price:"$1400"},
{name:"Amazon Expedition",days:"7",price:"$1800"}
],

thailand:[
{name:"Bangkok Explorer",days:"4",price:"$650"},
{name:"Phuket Escape",days:"5",price:"$850"}
],

dubai:[
{name:"Dubai City Experience",days:"4",price:"$700"},
{name:"Dubai Luxury Tour",days:"5",price:"$1100"}
]

};

let currentCountry="";

function showTours(country){

currentCountry=country;

renderTours(tours[country]);

}

function renderTours(list){

let html="";

list.forEach((tour,i)=>{

html+=`

<div class="tour" data-days="${tour.days}">

<h3>${tour.name}</h3>

<p>Duration: ${tour.days} Days</p>

<p class="price">Price: ${tour.price}</p>

<button onclick="toggleItinerary(${i})">
View Itinerary
</button>

<a href="global-tour-booking.html?tour=${tour.name}">
<button>Book Tour</button>
</a>

<div class="itinerary" id="it${i}">

Day 1 – Arrival & city tour<br>
Day 2 – Local exploration<br>
Day 3 – Adventure activities<br>
Day 4 – Departure

</div>

</div>

`;

});

document.getElementById("tours").innerHTML=html;

}

function toggleItinerary(i){

let el=document.getElementById("it"+i);

if(el.style.display=="block")
el.style.display="none";
else
el.style.display="block";

}

function filterTours(days){

if(days=="all"){

renderTours(tours[currentCountry]);

return;

}

let filtered=tours[currentCountry].filter(t=>t.days==days);

renderTours(filtered);

}

</script>

</body>

</html>
