<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Expeditions | Yes We Care Travels</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
}

/* HEADER */

header{
background:#0b2a4a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:35px;
}

.language button{
background:#4b3fd6;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
}

/* HERO */

.hero{
background:#4b3fd6;
color:white;
text-align:center;
padding:70px 20px;
}

.search input{
padding:12px;
width:250px;
border-radius:5px;
border:none;
}

/* SECTION */

.section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* DESTINATION CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
cursor:pointer;
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card div{
padding:15px;
}

/* TOURS */

.tour{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.price{
color:#4b3fd6;
font-weight:bold;
}

button{
background:#4b3fd6;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
margin-top:10px;
}

.itinerary{
display:none;
background:#eef1ff;
padding:10px;
margin-top:10px;
}

/* CONTACT */

.contact{
background:#0b2a4a;
color:white;
padding:40px;
text-align:center;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:12px 18px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="images/logo-yes-we-care-travels.png">

<b>Yes We Care Travels</b>

</div>

<div class="language">
<button>🌐 Language</button>
</div>

</header>

<section class="hero">

<h1>Global Expeditions</h1>

<p>Explore curated international tours</p>

<div class="search">
<input id="search" placeholder="Search destination or tour">
</div>

</section>

<section class="section">

<h2>Destinations</h2>

<div class="grid">

<div class="card" onclick="showTours('peru')">
<img src="https://images.unsplash.com/photo-1526392060635-9d6019884377">
<div>
<h3>Peru</h3>
<p>Machu Picchu Tours</p>
</div>
</div>

<div class="card" onclick="showTours('thailand')">
<img src="https://images.unsplash.com/photo-1508009603885-50cf7c579365">
<div>
<h3>Thailand</h3>
<p>Bangkok & Phuket</p>
</div>
</div>

</div>

<div id="tours"></div>

</section>

<section class="contact">

<h2>Contact Us</h2>

<p>Email: support@yeswecaretravels.com</p>

<p>Phone / WhatsApp: +91 9419287356</p>

</section>

<a class="whatsapp"
href="https://wa.me/919419287356"
target="_blank">

WhatsApp

</a>

<script>

const tours={

peru:[
{name:"Cusco Explorer",days:"4",price:"$950"},
{name:"Sacred Valley",days:"5",price:"$1100"},
{name:"Machu Picchu Classic",days:"6",price:"$1400"},
{name:"Amazon Expedition",days:"7",price:"$1800"}
],

thailand:[
{name:"Bangkok Explorer",days:"4",price:"$650"},
{name:"Phuket Escape",days:"5",price:"$850"}
]

};

let currentCountry="";

function showTours(country){

currentCountry=country;

renderTours(tours[country]);

}

function renderTours(list){

let html="";

list.forEach((tour,i)=>{

html+=`

<div class="tour">

<h3>${tour.name}</h3>

<p>Duration: ${tour.days} Days</p>

<p class="price">Price: ${tour.price}</p>

<button onclick="toggleItinerary(${i})">

View Itinerary

</button>

<a href="global-tour-booking.html?tour=${tour.name}">

<button>

Book Tour

</button>

</a>

<div class="itinerary" id="it${i}">

Day 1 – Arrival<br>
Day 2 – Local tour<br>
Day 3 – Activities<br>
Day 4 – Departure

</div>

</div>

`;

});

document.getElementById("tours").innerHTML=html;

}

function toggleItinerary(i){

let el=document.getElementById("it"+i);

if(el.style.display=="block"){
el.style.display="none";
}else{
el.style.display="block";
}

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

if(!currentCountry) return;

let filtered=tours[currentCountry].filter(tour=>{

return tour.name.toLowerCase().includes(keyword);

});

renderTours(filtered);

});

</script>

</body>
</html>
