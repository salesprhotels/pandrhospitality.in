<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tour Search Engine | Yes We Care Travels</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:0
}

.search-box{
max-width:900px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,.1)
}

.search-box h2{
margin-bottom:20px
}

.search-box input,
.search-box select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px
}

.search-box button{
padding:12px;
background:#0b5ed7;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer
}

.result-box{
max-width:900px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,.1)
}

.whatsapp{
background:#25D366;
color:#fff;
padding:10px 20px;
border-radius:5px;
text-decoration:none
}

</style>

</head>

<body>

<div class="search-box">

<h2>Search Your Tour</h2>

<input type="text" id="destinationSearch" placeholder="Search Destination">

<select id="category">
<option value="">Category</option>
<option>Holiday</option>
<option>Honeymoon</option>
<option>Family</option>
<option>Adventure</option>
</select>

<select id="days">
<option value="">Days</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
</select>

<select id="pickup">
<option>Pickup City</option>
<option>Delhi</option>
<option>Chandigarh</option>
<option>Amritsar</option>
<option>Jammu</option>
</select>

<select id="vehicle">
<option>Vehicle</option>
<option>Sedan</option>
<option>SUV</option>
<option>Tempo Traveller</option>
</select>

<select id="hotel">
<option>Hotel Category</option>
<option>Budget</option>
<option>3 Star</option>
<option>4 Star</option>
<option>5 Star</option>
</select>

<select id="meal">
<option>Meal Plan</option>
<option>EP</option>
<option>CP</option>
<option>MAP</option>
<option>AP</option>
</select>

<button onclick="searchTours()">Generate Itinerary</button>

</div>

<div id="results"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbw9YNYK61XcpxxlAoUJtuyT0AVOKvLWpIkPx4pW0U4baS-Ze9oFc_aTaIUnQuFDO6in/exec"

function searchTours(){

let destination=document.getElementById("destinationSearch").value
let category=document.getElementById("category").value
let days=document.getElementById("days").value

let url=API+"?destination="+destination+"&category="+category+"&days="+days

fetch(url)
.then(res=>res.json())
.then(data=>showTours(data))

}

function showTours(data){

if(data.length==0){

document.getElementById("results").innerHTML="<div class='result-box'>No tours found</div>"
return

}

let tours={}

data.forEach(row=>{

if(!tours[row.tour_name]){

tours[row.tour_name]=[]

}

tours[row.tour_name].push(row)

})

let html=""

for(let tour in tours){

html+=`

<div class="result-box">

<h3>${tour}</h3>

<p>${tours[tour][0].days} Days Tour</p>

<button onclick="viewItinerary('${tour}')">
View Itinerary
</button>

</div>

`

}

document.getElementById("results").innerHTML=html

}

function viewItinerary(tour){

fetch(API+"?tour="+tour)

.then(res=>res.json())

.then(data=>{

let html="<div class='result-box'><h3>"+tour+"</h3>"

data.forEach(d=>{

html+=`

<p><b>${d.day_number}</b></p>
<p>${d.title}</p>
<p>${d.description}</p>
<hr>

`

})

html+=`

<button onclick="window.print()">Print Itinerary</button>

<button onclick="downloadPDF()">Download PDF</button>

<br><br>

<a class="whatsapp" target="_blank"
href="https://wa.me/919419287356?text=I want to enquire about ${tour}">
WhatsApp Enquiry
</a>

<br><br>

<form>

<input placeholder="Your Name">

<input placeholder="Phone">

<input placeholder="Email">

<button>Send Enquiry</button>

</form>

`

html+="</div>"

document.getElementById("results").innerHTML=html

})

}

function downloadPDF(){

window.print()

}

</script>

</body>
</html>
