<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Exploration | Yes We Care Travels</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

/* HEADER */

header{
background:#0b2a4a;
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

/* LANGUAGE */

.language{
position:relative;
}

.language button{
background:#4b3fd6;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
}

.language-menu{
display:none;
position:absolute;
background:white;
right:0;
top:36px;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.language-menu a{
display:block;
padding:10px;
cursor:pointer;
}

.language:hover .language-menu{
display:block;
}

/* HERO */

.hero{
background:#4b3fd6;
color:white;
text-align:center;
padding:60px 20px;
}

/* COUNTRY CARDS */

.section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:8px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
cursor:pointer;
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card div{
padding:14px;
}

/* TOUR */

.tour{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.price{
color:#4b3fd6;
font-weight:bold;
}

button{
background:#4b3fd6;
color:white;
border:none;
padding:10px 16px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="google_translate_element" style="position:absolute;left:-9999px;"></div>

<header>

<div class="logo">
Yes We Care Travels
</div>

<div class="language">

<button>🌐 Language</button>

<div class="language-menu">

<a onclick="changeLanguage('en')">🇬🇧 English</a>
<a onclick="changeLanguage('es')">🇪🇸 Spanish</a>
<a onclick="changeLanguage('fr')">🇫🇷 French</a>
<a onclick="changeLanguage('de')">🇩🇪 German</a>
<a onclick="changeLanguage('hi')">🇮🇳 Hindi</a>

</div>

</div>

</header>

<section class="hero">

<h1>Global Exploration</h1>

<p>Explore international destinations and tour packages</p>

</section>

<section class="section">

<h2>Select Destination</h2>

<div class="grid">

<div class="card" onclick="showCountry('peru')">

<img src="images/peru.jpg">

<div>

<h3>Peru</h3>

</div>

</div>

<div class="card" onclick="showCountry('thailand')">

<img src="images/thailand.jpg">

<div>

<h3>Thailand</h3>

</div>

</div>

<div class="card" onclick="showCountry('dubai')">

<img src="images/dubai.jpg">

<div>

<h3>Dubai</h3>

</div>

</div>

</div>

<div id="tours"></div>

</section>

<script>

const tours={

peru:[
{name:"Cusco City Tour",price:"$120"},
{name:"Sacred Valley Classic",price:"$180"},
{name:"Rainbow Mountain",price:"$150"}
],

thailand:[
{name:"Bangkok City Tour",price:"$90"},
{name:"Phuket Island Tour",price:"$140"}
],

dubai:[
{name:"Dubai City Tour",price:"$110"},
{name:"Desert Safari",price:"$130"}
]

};

function showCountry(country){

let html="";

tours[country].forEach(tour=>{

html+=`

<div class="tour">

<h3>${tour.name}</h3>

<p class="price">Price: ${tour.price}</p>

<a href="global-tour-booking.html?tour=${tour.name}">

<button>Book This Tour</button>

</a>

</div>

`;

});

document.getElementById("tours").innerHTML=html;

}

/* GOOGLE TRANSLATE */

function googleTranslateElementInit(){

new google.translate.TranslateElement({

pageLanguage:'en',

includedLanguages:'en,es,fr,de,hi'

},'google_translate_element');

}

function changeLanguage(lang){

var interval=setInterval(function(){

var select=document.querySelector(".goog-te-combo");

if(select){

select.value=lang;

select.dispatchEvent(new Event("change"));

clearInterval(interval);

}

},500);

}

</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
